<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareSync | Patient Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styleclinic.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="Index.html" class="brand">
        <span class="brand-mark">+</span>
        <span>CareSync</span>
      </a>

      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="mainNav">
        <a href="Index.html">Home</a>
        <a href="booking.html">Book Appointment</a>
        <a href="Index.html#services">Services</a>
        <a href="Index.html#contact">Contact</a>
        <a href="login.html">Login</a>
        <a href="register.html" class="btn btn-small">Register</a>
      </nav>
    </div>
  </header>

  <main class="booking-page">
    <div class="container booking-shell">
      <h1>Patient Login</h1>
      <p class="booking-intro">Sign in to manage your appointments.</p>

      <form id="loginForm" class="booking-form" action="/api/auth/login" method="post" novalidate>
        <div class="form-grid">
          <div class="field">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
          </div>

          <div class="field">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
        </div>

        <button type="submit" class="btn">Login</button>
        <p id="loginStatus" class="form-status" aria-live="polite"></p>

        <p class="auth-switch">
          New to CareSync? <a class="link" href="register.html">Create an account</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="site-footer" id="contact">
    <div class="container footer-wrap">
      <p>CareSync Clinic, 12 Wellness Avenue, Downtown</p>
      <p>Email: hello@caresync.example | Phone: +1 (000) 123-4567</p>
      <p class="copyright">© <span id="currentYear"></span> CareSync. All rights reserved.</p>
    </div>
  </footer>

  <script src="scriptclinic.js"></script>
</body>
</html>
